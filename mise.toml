# mise tasks for lasso.
#   mise run dev    — Vite dev server (frontend HMR) proxying to the Go backend
#   mise run build  — build the frontend (web/dist) then the binary
#   mise run test   — run the Go tests

[tasks."build:web"]
description = "Build the React/shadcn frontend into web/dist (embedded by Go)"
dir = "web"
run = "bun install && bun run build"

[tasks.build]
description = "Build the frontend then the lasso binary"
depends = ["build:web"]
run = "go build -o lasso ."

[tasks.test]
description = "Run the Go test suite"
run = "go test ."

[tasks.bump]
description = "Bump lassoSemver (major, minor, or patch)"
usage = '''
arg "[type]" help="Version type: major, minor, or patch" default="patch"
flag "-c --commit" help="Auto-commit after bumping"
'''
run = """
#!/usr/bin/env bash
set -e

# version.go holds the single source of truth: const lassoSemver = "X.Y.Z".
current=$(perl -ne 'print $1 if /lassoSemver = "([0-9]+\\.[0-9]+\\.[0-9]+)"/' version.go)
[ -n "$current" ] || { echo "couldn't read lassoSemver from version.go" >&2; exit 1; }
IFS='.' read -r major minor patch <<< "$current"

case "${usage_type}" in
  major) major=$((major + 1)); minor=0; patch=0 ;;
  minor) minor=$((minor + 1)); patch=0 ;;
  patch) patch=$((patch + 1)) ;;
  *) echo "Invalid type: ${usage_type}. Use major, minor, or patch" >&2; exit 1 ;;
esac

new_version="$major.$minor.$patch"

perl -i -pe "s/lassoSemver = \\"[0-9]+\\.[0-9]+\\.[0-9]+\\"/lassoSemver = \\"$new_version\\"/" version.go
echo "Bumped lassoSemver: $current → $new_version"

# Auto-commit if --commit flag is set
if [ "$usage_commit" = "true" ]; then
  git add version.go
  git commit -m "chore: bump version to $new_version"
  echo "Committed version bump"
fi
"""

[tasks.dev]
description = "Frontend hot reload (Vite) on the tailscale IP, proxying /api + terminals to the Go backend"
depends = ["build"]
shell = "bash -c"
run = '''
ip="$(tailscale ip -4 | head -n1)"
[ -n "$ip" ] || { echo "no tailscale IPv4 found — is tailscale up? (tailscale status)" >&2; exit 1; }

# Backend on loopback, on a dedicated DEV port (8190) — deliberately distinct
# from the production default (8090) so a dev instance never shares a port
# number with a real one, even across interfaces. With -dev it monotonically
# bumps to the next free port if 8190 is taken (e.g. a second dev instance), so
# several can run at once. We read the port it actually bound from its log and
# point Vite's proxy at that. (ttyd needs no port here: spawn mode gives each
# lasso its own per-PID unix sockets.)
logf="$(mktemp)"
./lasso -listen 127.0.0.1:8190 -insecure-no-auth -dev >"$logf" 2>&1 &
backend=$!
trap 'kill "$backend" 2>/dev/null; rm -f "$logf"' EXIT

port=""
for _ in $(seq 1 100); do
  port="$(sed -n 's#.*UI:[[:space:]]*http://127\.0\.0\.1:\([0-9][0-9]*\).*#\1#p' "$logf" | head -n1)"
  [ -n "$port" ] && break
  kill -0 "$backend" 2>/dev/null || { echo "backend exited before binding a port:" >&2; cat "$logf" >&2; exit 1; }
  sleep 0.1
done
[ -n "$port" ] || { echo "backend never reported its port; log:" >&2; cat "$logf" >&2; exit 1; }

# Surface the backend's own logs (port bumps, theme reloads) in the foreground.
tail -n +1 -f "$logf" & tailpid=$!
trap 'kill "$backend" "$tailpid" 2>/dev/null; rm -f "$logf"' EXIT

echo "lasso (dev): backend on 127.0.0.1:$port · Vite UI on http://$ip (frontend hot reload ON)"
echo "edit anything under web/src and the browser hot-reloads; restart this task for Go changes."
# Vite auto-bumps its own port (5173→5174→…) if busy and prints the chosen URL.
cd web && env LASSO_BACKEND="http://127.0.0.1:$port" bun run dev --host "$ip"
'''
