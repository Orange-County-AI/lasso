<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>herdr + file viewer</title>
<style>
  :root {
    /* Fallback palette (Rosé Pine). The server injects a <style> after this
       one with the active herdr theme's variables, which override these. */
    --bg: #191724;        /* base — matches terminal bg */
    --panel: #1f1d2e;     /* surface */
    --border: #26233a;    /* overlay */
    --hover: #26233a;     /* hover/elevated surface */
    --fg: #e0def4;        /* text */
    --muted: #6e6a86;     /* muted */
    --accent: #9ccfd8;    /* foam */
    --accent-dim: #9ccfd826;
    --dir: #c4a7e7;       /* iris */
    --good: #9ccfd8;      /* foam */
    --warn: #f6c177;      /* gold */
    --bad: #eb6f92;       /* love */
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg); color: var(--fg);
    font: 13px/1.5 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
  #app { display: flex; height: 100%; width: 100%; }

  /* left: terminal */
  #left { flex: 1 1 60%; min-width: 240px; display: flex; flex-direction: column; }
  #left iframe { border: 0; width: 100%; height: 100%; display: block; background: var(--bg); }

  /* drag handle */
  #splitter { flex: 0 0 6px; cursor: col-resize; background: var(--border);
    transition: background .15s; }
  #splitter:hover, #splitter.dragging { background: var(--accent); }
  /* while dragging, let the iframe ignore the mouse so the parent keeps getting
     mousemove events (otherwise the terminal swallows them and you can only
     drag toward the sidebar, never back over the terminal) */
  #app.dragging { cursor: col-resize; user-select: none; }
  #app.dragging #left iframe { pointer-events: none; }

  /* small icon button (collapse toggle in the header) */
  .iconbtn { margin-left: auto; background: var(--hover); color: var(--muted);
    border: 1px solid var(--border); border-radius: 4px; padding: 0 7px; line-height: 18px;
    font: inherit; font-size: 13px; cursor: pointer; }
  .iconbtn:hover { color: var(--accent); border-color: var(--accent); }

  /* floating tab to bring the sidebar back; only shown while collapsed */
  #reopen { position: fixed; top: 8px; right: 8px; z-index: 10; display: none;
    background: var(--panel); color: var(--accent); border: 1px solid var(--border);
    border-radius: 4px; padding: 4px 9px; font: inherit; font-size: 14px; cursor: pointer;
    box-shadow: 0 1px 6px rgba(0,0,0,.35); }
  #reopen:hover { border-color: var(--accent); }
  #app.collapsed #reopen { display: block; }

  /* right: file viewer */
  #right { flex: 1 1 40%; min-width: 280px; display: flex; flex-direction: column;
    background: var(--panel); border-left: 1px solid var(--border); overflow: hidden; }

  /* collapsed: hide the sidebar + splitter, let the terminal fill the width */
  #app.collapsed #right, #app.collapsed #splitter { display: none; }

  /* tab strip + swappable views inside the right column */
  .tabs { display: flex; align-items: stretch; flex: 0 0 auto;
    border-bottom: 1px solid var(--border); background: var(--bg); }
  .tabs .tab { background: transparent; color: var(--muted); border: 0;
    border-bottom: 2px solid transparent; padding: 7px 11px; font: inherit; font-size: 12px;
    cursor: pointer; white-space: nowrap; }
  .tabs .tab:hover { color: var(--fg); }
  .tabs .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tabs #collapse { align-self: center; margin-right: 8px; }
  .view { display: none; flex: 1 1 auto; min-height: 0; flex-direction: column; overflow: hidden; }
  .view.active { display: flex; }

  /* pane grid */
  #panegrid { flex: 1 1 auto; overflow: auto; padding: 10px; display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 8px;
    align-content: start; align-items: start; }  /* start, not stretch — else cards collapse */
  .pgroup { grid-column: 1 / -1; display: flex; gap: 6px; align-items: baseline;
    color: var(--muted); font-size: 11px; margin-top: 8px; padding-bottom: 2px;
    border-bottom: 1px solid var(--border); }
  .pgroup:first-child { margin-top: 0; }
  .pgroup .gw { color: var(--accent); }
  /* block layout (not flex) so the card grows to fit its content — a flex
     column grid item gets squashed to the auto row height and clips to nothing.
     no overflow:hidden on the card either: it collapses the card's content
     contribution so the auto grid row undersizes and the next group overlaps.
     The text lines below clip themselves (overflow+ellipsis). */
  .pcard { position: relative; border: 1px solid var(--border); border-radius: 6px;
    padding: 8px 9px; cursor: pointer; background: var(--bg);
    transition: border-color .12s, background .12s; }
  .pcard:hover { border-color: var(--accent); background: var(--hover); }
  .pcard.focused { border-color: var(--accent); background: var(--accent-dim); }
  /* multi-select (ctrl/⌘/shift-click) — distinct from .focused: an accent ring + ✓ badge */
  .pcard.selected { outline: 2px solid var(--accent); outline-offset: -2px; background: var(--accent-dim); }
  .pcard.selected::after { content: '✓'; position: absolute; top: 3px; right: 5px;
    color: var(--accent); font-size: 11px; line-height: 1; }
  .pcard.selected .ptitle { padding-right: 12px; }   /* keep the title clear of the badge */
  .pcard .ptitle { color: var(--fg); font-size: 12px; white-space: nowrap; overflow: hidden;
    text-overflow: ellipsis; }
  .pcard .pmeta { color: var(--muted); font-size: 10px; white-space: nowrap; overflow: hidden;
    text-overflow: ellipsis; margin-top: 2px; }
  .pcard .pagent { font-size: 10px; color: var(--muted); white-space: nowrap; margin-top: 2px; }
  .pcard .pagent.working { color: var(--warn); }
  .pcard .pagent.blocked { color: var(--bad); }
  .pcard .pagent.idle, .pcard .pagent.done { color: var(--good); }

  /* selection action bar (shown when ≥1 pane is selected) */
  .selbar { margin-top: 6px; }
  .selbtn { background: var(--hover); color: var(--muted); border: 1px solid var(--border);
    border-radius: 4px; padding: 3px 9px; font: inherit; font-size: 11px; cursor: pointer; }
  .selbtn:hover { color: var(--accent); border-color: var(--accent); }
  .selbtn.danger:hover { color: var(--bg); background: var(--bad); border-color: var(--bad); }

  /* right-click context menu */
  .ctxmenu { position: fixed; z-index: 50; display: none; min-width: 150px; padding: 4px;
    background: var(--panel); border: 1px solid var(--border); border-radius: 6px;
    box-shadow: 0 4px 16px rgba(0,0,0,.45); font-size: 12px; }
  .ctxmenu.open { display: block; }
  .ctxmenu .mi { padding: 6px 10px; border-radius: 4px; cursor: pointer; color: var(--fg);
    white-space: nowrap; }
  .ctxmenu .mi:hover { background: var(--hover); }
  .ctxmenu .mi.danger { color: var(--bad); }
  .ctxmenu .mi.danger:hover { background: var(--bad); color: var(--bg); }

  /* footer hint under the pane grid */
  .hint { flex: 0 0 auto; padding: 6px 12px; border-top: 1px solid var(--border);
    color: var(--muted); font-size: 10px; background: var(--bg); }

  header.bar { padding: 8px 12px; border-bottom: 1px solid var(--border); background: var(--bg); }
  .row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .pill { padding: 1px 7px; border-radius: 10px; border: 1px solid var(--border);
    font-size: 11px; color: var(--muted); white-space: nowrap; }
  .pill.ws { color: var(--accent); border-color: var(--accent-dim); }
  .pill.agent.working { color: var(--warn); border-color: var(--warn); }
  .pill.agent.blocked { color: var(--bad); border-color: var(--bad); }
  .pill.agent.idle, .pill.agent.done { color: var(--good); border-color: var(--good); }
  .pill.src { display: none; }
  .pill.src.process { display: inline; color: var(--good); border-color: var(--good); }
  .pill.src.stale { display: inline; color: var(--warn); border-color: var(--warn); }

  .goto { margin-top: 6px; display: flex; gap: 6px; }
  .goto input { flex: 1 1 auto; min-width: 0; background: var(--bg); color: var(--fg);
    border: 1px solid var(--border); border-radius: 4px; padding: 3px 7px;
    font: inherit; font-size: 12px; }
  .goto input:focus { outline: 0; border-color: var(--accent); }
  .goto button { background: var(--hover); color: var(--muted); border: 1px solid var(--border);
    border-radius: 4px; padding: 3px 8px; font: inherit; font-size: 11px; cursor: pointer;
    white-space: nowrap; }
  .goto button:hover { color: var(--accent); border-color: var(--accent); }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); display: inline-block; }
  .dot.live { background: var(--good); box-shadow: 0 0 6px var(--good); }

  .cwd { margin-top: 6px; display: flex; align-items: center; gap: 6px; }
  .cwd .crumbs { color: var(--fg); word-break: break-all; }
  .cwd .crumbs a { color: var(--accent); text-decoration: none; cursor: pointer; }
  .cwd .crumbs a:hover { text-decoration: underline; }
  label.follow { margin-left: auto; color: var(--muted); font-size: 11px; cursor: pointer;
    display: flex; align-items: center; gap: 4px; white-space: nowrap; }

  #files { flex: 1 1 auto; overflow: auto; }
  .entry { display: flex; align-items: center; gap: 8px; padding: 3px 12px; cursor: pointer;
    white-space: nowrap; }
  .entry:hover { background: var(--hover); }
  .entry.sel { background: var(--accent-dim); }
  .entry .nm { overflow: hidden; text-overflow: ellipsis; }
  .entry.d .nm { color: var(--dir); }
  .entry .sz { margin-left: auto; color: var(--muted); font-size: 11px; }
  .ico { width: 14px; text-align: center; opacity: .8; }

  #preview { flex: 0 0 auto; max-height: 45%; overflow: auto; border-top: 1px solid var(--border);
    display: none; background: var(--bg); }
  #preview.open { display: block; }
  #preview .phdr { position: sticky; top: 0; background: var(--bg); padding: 6px 12px;
    border-bottom: 1px solid var(--border); display: flex; gap: 8px; align-items: center; }
  #preview .phdr .x { margin-left: auto; cursor: pointer; color: var(--muted); }
  #preview pre { margin: 0; padding: 10px 12px; white-space: pre; font-size: 12px; }
  #preview img { max-width: 100%; display: block; padding: 10px; }
  .empty { color: var(--muted); padding: 16px 12px; }

  /* small inline option checkboxes (diff toolbar) */
  .opt { color: var(--muted); font-size: 11px; cursor: pointer; display: flex;
    align-items: center; gap: 4px; white-space: nowrap; }
  .opt input { margin: 0; }

  /* diff viewer */
  #difflist { flex: 1 1 auto; overflow: auto; }
  .dfile { border-bottom: 1px solid var(--border); }
  .dfhead { position: sticky; top: 0; z-index: 1; display: flex; align-items: center; gap: 8px;
    padding: 5px 10px; background: var(--panel); cursor: pointer; border-bottom: 1px solid var(--border); }
  .dfhead:hover { background: var(--hover); }
  .dfhead .caret { color: var(--muted); width: 10px; flex: 0 0 auto; }
  .dfhead .dfname { color: var(--fg); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .dfhead .dfstat { margin-left: auto; font-size: 11px; white-space: nowrap; flex: 0 0 auto; }
  .dfhead .dfstat .add { color: var(--good); } .dfhead .dfstat .del { color: var(--bad); }
  .dfbody { background: var(--bg); }
  .dline { display: flex; font-size: 12px; line-height: 1.45; }
  .dline .sign { flex: 0 0 16px; text-align: center; color: var(--muted); user-select: none; }
  .dline .txt { white-space: pre; overflow: visible; }
  #difflist.wrap .dline .txt { white-space: pre-wrap; word-break: break-all; }
  .dline.add { background: color-mix(in srgb, var(--good) 15%, transparent); }
  .dline.add .sign { color: var(--good); }
  .dline.del { background: color-mix(in srgb, var(--bad) 15%, transparent); }
  .dline.del .sign { color: var(--bad); }
  .dline.ctx .txt { color: var(--muted); }
  .dline.hunk { color: var(--accent); background: var(--accent-dim); }
  .dline.hunk .txt { white-space: pre-wrap; }
  .dline.meta .txt { color: var(--muted); font-style: italic; }

  /* browser pane */
  .brbar { display: flex; gap: 6px; align-items: center; flex: 0 0 auto;
    padding: 6px 8px; border-bottom: 1px solid var(--border); background: var(--bg); }
  .brbar input { flex: 1 1 auto; min-width: 0; background: var(--panel); color: var(--fg);
    border: 1px solid var(--border); border-radius: 4px; padding: 3px 7px; font: inherit; font-size: 12px; }
  .brbar input:focus { outline: 0; border-color: var(--accent); }
  .brbtn { background: var(--hover); color: var(--muted); border: 1px solid var(--border);
    border-radius: 4px; padding: 3px 8px; font: inherit; font-size: 12px; cursor: pointer; white-space: nowrap; }
  .brbtn:hover { color: var(--accent); border-color: var(--accent); }
  #brframe { flex: 1 1 auto; min-height: 0; width: 100%; border: 0; background: var(--bg); }
</style>
<!--THEME-->
</head>
<body>
<div id="app">
  <div id="left"><iframe id="term" src="/terminal/" title="herdr terminal"></iframe></div>
  <div id="splitter"></div>
  <button id="reopen" title="show file viewer">«</button>
  <div id="right">
    <nav class="tabs">
      <button class="tab active" data-view="files">Files</button>
      <button class="tab" data-view="panes">Panes</button>
      <button class="tab" data-view="diff">Diff</button>
      <button class="tab" data-view="browser">Browser</button>
      <button class="iconbtn" id="collapse" title="collapse sidebar">»</button>
    </nav>

    <section class="view active" id="view-files">
      <header class="bar">
        <div class="row">
          <span class="dot" id="live"></span>
          <span class="pill ws" id="ws">workspace —</span>
          <span class="pill" id="tab">tab —</span>
          <span class="pill agent" id="agent" style="display:none"></span>
          <span class="pill src" id="src"></span>
        </div>
        <div class="cwd">
          <span class="crumbs" id="crumbs">—</span>
          <label class="follow"><input type="checkbox" id="follow" checked> follow active pane</label>
        </div>
        <div class="goto">
          <input id="path" type="text" spellcheck="false" autocomplete="off" placeholder="go to path…  (Enter)">
          <button id="jump" title="jump to the active pane's directory">⟳ active</button>
        </div>
      </header>
      <div id="files"><div class="empty">waiting for herdr…</div></div>
      <div id="preview">
        <div class="phdr"><span id="pname"></span><span class="x" onclick="closePreview()">✕ close</span></div>
        <div id="pbody"></div>
      </div>
    </section>

    <section class="view" id="view-panes">
      <header class="bar">
        <div class="row">
          <span class="pill ws" id="panes-count">panes —</span>
          <span class="pill" id="panes-msg" style="display:none"></span>
          <button class="iconbtn" id="panes-refresh" title="refresh pane list">⟳</button>
        </div>
        <div class="row selbar" id="selbar" style="display:none">
          <span class="pill ws" id="selcount">0 selected</span>
          <button class="selbtn danger" id="sel-close">Close selected</button>
          <button class="selbtn" id="sel-clear">Clear</button>
        </div>
      </header>
      <div id="panegrid"><div class="empty">loading panes…</div></div>
      <div class="hint" id="panes-hint">click to focus · ⌘/ctrl/shift-click to multi-select · right-click for rename / close</div>
    </section>

    <section class="view" id="view-diff">
      <header class="bar">
        <div class="row">
          <span class="pill ws" id="diff-branch">—</span>
          <span class="pill" id="diff-base" style="display:none"></span>
          <span class="pill" id="diff-msg" style="display:none"></span>
          <button class="iconbtn" id="diff-refresh" title="refresh diff">⟳</button>
        </div>
        <div class="cwd">
          <span class="crumbs" id="diff-repo">—</span>
          <label class="follow"><input type="checkbox" id="diff-follow" checked> follow active pane</label>
        </div>
        <div class="row" style="margin-top:6px; gap:12px;">
          <label class="opt"><input type="checkbox" id="diff-ws"> ignore whitespace</label>
          <label class="opt"><input type="checkbox" id="diff-untracked"> untracked</label>
          <label class="opt"><input type="checkbox" id="diff-wrap"> wrap</label>
          <button class="selbtn" id="diff-collapse" style="margin-left:auto">collapse all</button>
        </div>
      </header>
      <div id="difflist"><div class="empty">loading diff…</div></div>
    </section>

    <section class="view" id="view-browser">
      <div class="brbar">
        <button class="brbtn" id="br-reload" title="reload">⟳</button>
        <input id="br-url" type="text" spellcheck="false" autocomplete="off" placeholder="http://host:3000">
        <button class="brbtn" id="br-go">go</button>
        <button class="brbtn" id="br-open" title="open in new tab">↗</button>
      </div>
      <iframe id="brframe" title="browser preview" referrerpolicy="no-referrer"></iframe>
    </section>
  </div>
  <div class="ctxmenu" id="ctxmenu"></div>
</div>

<script>
const $ = s => document.querySelector(s);
let curPath = null;        // dir currently shown in the file list
let activeCwd = null;      // cwd of herdr's focused pane
let activePaneID = null;   // pane_id of herdr's focused pane
let selected = null;
let curView = 'files';     // which right-column view is showing
let paneEls = {};          // pane_id -> grid card element (for focus highlighting)
let paneData = {};         // pane_id -> pane object (for context-menu actions)
let selectedPanes = new Set(); // pane_ids selected for bulk actions
let diffCwd = null;        // repo dir last loaded in the Diff view
let diffCollapsed = new Set(); // file paths collapsed in the Diff view
let diffAllCollapsed = false;
let browserInit = false;   // browser pane lazily initialized on first open
let lastPanesRev = -1;     // server's pane-grid layout revision (workspace order/membership)

// ---- file list ----
async function loadDir(path) {
  curPath = path;
  try {
    const r = await fetch('/api/files?path=' + encodeURIComponent(path));
    if (!r.ok) throw new Error(await r.text());
    const data = await r.json();
    renderDir(data);
  } catch (e) {
    $('#files').innerHTML = '<div class="empty">cannot read ' + path + '<br>' + e.message + '</div>';
  }
}

function renderDir(data) {
  renderCrumbs(data.path);
  const pin = $('#path');                                   // reflect location (unless user is typing)
  if (pin && document.activeElement !== pin) pin.value = data.path;
  const f = $('#files');
  f.innerHTML = '';
  if (data.parent && data.parent !== data.path) {
    f.appendChild(entryEl({ name: '..', dir: true }, data.parent, true));
  }
  if (!data.entries.length) {
    const d = document.createElement('div'); d.className = 'empty'; d.textContent = '(empty)';
    f.appendChild(d);
  }
  for (const e of data.entries) {
    const full = data.path.replace(/\/$/, '') + '/' + e.name;
    f.appendChild(entryEl(e, full, false));
  }
}

function entryEl(e, full, isUp) {
  const div = document.createElement('div');
  div.className = 'entry ' + (e.dir ? 'd' : 'f');
  div.innerHTML = '<span class="ico">' + (e.dir ? (isUp ? '↑' : '▸') : '·') + '</span>' +
    '<span class="nm">' + escapeHtml(e.name) + '</span>' +
    (e.dir ? '' : '<span class="sz">' + fmtSize(e.size) + '</span>');
  div.onclick = () => {
    if (e.dir) loadDir(full);
    else openFile(full, div);
  };
  return div;
}

function renderCrumbs(path) {
  const parts = path.split('/').filter(Boolean);
  let acc = '';
  const frags = ['<a data-p="/">/</a>'];
  for (const p of parts) {
    acc += '/' + p;
    frags.push('<a data-p="' + acc + '">' + escapeHtml(p) + '</a>');
  }
  const c = $('#crumbs');
  c.innerHTML = frags.join('<span style="color:var(--muted)">/</span>');
  c.querySelectorAll('a').forEach(a => a.onclick = () => loadDir(a.dataset.p));
}

// ---- preview ----
const IMG = /\.(png|jpe?g|gif|webp|svg|bmp|ico)$/i;
async function openFile(path, el) {
  if (selected) selected.classList.remove('sel');
  if (el) { el.classList.add('sel'); selected = el; }
  $('#pname').textContent = path;
  const body = $('#pbody');
  $('#preview').classList.add('open');
  if (IMG.test(path)) {
    body.innerHTML = '<img src="/api/file?path=' + encodeURIComponent(path) + '">';
    return;
  }
  body.innerHTML = '<pre>loading…</pre>';
  try {
    const r = await fetch('/api/file?path=' + encodeURIComponent(path));
    const txt = await r.text();
    const pre = document.createElement('pre');
    pre.textContent = txt;
    body.innerHTML = ''; body.appendChild(pre);
  } catch (e) {
    body.innerHTML = '<pre>error: ' + e.message + '</pre>';
  }
}
function closePreview() { $('#preview').classList.remove('open'); if (selected) selected.classList.remove('sel'); }

// ---- view tabs (Files / Panes) ----
function switchView(name) {
  curView = name;
  document.querySelectorAll('.tabs .tab').forEach(t => t.classList.toggle('active', t.dataset.view === name));
  document.querySelectorAll('.view').forEach(v => v.classList.toggle('active', v.id === 'view-' + name));
  if (name === 'panes') loadPanes();
  else if (name === 'diff') loadDiff();
  else if (name === 'browser') initBrowser();
}
document.querySelectorAll('.tabs .tab').forEach(t => t.onclick = () => switchView(t.dataset.view));

// ---- pane grid ----
async function loadPanes() {
  const g = $('#panegrid');
  try {
    const r = await fetch('/api/panes');
    if (!r.ok) throw new Error(await r.text());
    const data = await r.json();
    renderPanes(data.panes || []);
  } catch (e) {
    paneEls = {};
    g.innerHTML = '<div class="empty">cannot list panes<br>' + escapeHtml(e.message) + '</div>';
  }
}

function renderPanes(panes) {
  const g = $('#panegrid');
  $('#panes-count').textContent = panes.length + ' pane' + (panes.length === 1 ? '' : 's');
  g.innerHTML = '';
  paneEls = {};
  paneData = {};
  const present = new Set(panes.map(p => p.pane_id));        // drop selections for vanished panes
  for (const id of [...selectedPanes]) if (!present.has(id)) selectedPanes.delete(id);
  if (!panes.length) { g.innerHTML = '<div class="empty">no panes</div>'; updateSelBar(); return; }
  let curWs = null;
  for (const p of panes) {
    if (p.workspace_id !== curWs) {                          // workspace group header
      curWs = p.workspace_id;
      const h = document.createElement('div');
      h.className = 'pgroup';
      h.innerHTML = '<span class="gw">' + escapeHtml(p.workspace_label || p.workspace_id) + '</span>';
      g.appendChild(h);
    }
    const card = paneCard(p);
    paneEls[p.pane_id] = card;
    paneData[p.pane_id] = p;
    g.appendChild(card);
  }
  updateSelBar();
}

function paneCard(p) {
  const d = document.createElement('div');
  d.className = 'pcard' + (p.focused ? ' focused' : '') + (selectedPanes.has(p.pane_id) ? ' selected' : '');
  const title = p.tab_label || p.pane_id;
  const cwd = (p.cwd || '').replace(/^\/home\/[^/]+/, '~');
  let agent = '';
  if (p.agent || (p.agent_status && p.agent_status !== 'unknown')) {
    agent = '<div class="pagent ' + (p.agent_status || '') + '">● ' +
      escapeHtml(p.agent || 'agent') + (p.agent_status ? ' · ' + escapeHtml(p.agent_status) : '') + '</div>';
  }
  d.innerHTML =
    '<div class="ptitle">' + escapeHtml(title) + '</div>' +
    (cwd ? '<div class="pmeta">' + escapeHtml(cwd) + '</div>' : '') + agent;
  d.title = [p.tab_label, p.cwd, p.pane_id].filter(Boolean).join('\n');
  d.onclick = (e) => {
    if (e.ctrlKey || e.metaKey || e.shiftKey) toggleSelect(p.pane_id);  // multi-select
    else { clearSelection(); focusPane(p, d); }                          // plain click: focus
  };
  d.oncontextmenu = (e) => { e.preventDefault(); openCtxMenu(e, p); };
  return d;
}

async function focusPane(p, el) {
  try {
    const r = await fetch('/api/focus', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ workspace_id: p.workspace_id, tab_id: p.tab_id }),
    });
    if (!r.ok) throw new Error(await r.text());
    Object.values(paneEls).forEach(c => c.classList.remove('focused'));   // optimistic; SSE confirms
    if (el) el.classList.add('focused');
    showPaneMsg('');
    try { document.getElementById('term').contentWindow.focus(); } catch (e) {}   // hand keyboard to the terminal
  } catch (e) {
    showPaneMsg('focus failed: ' + e.message, true);
  }
}

// ---- multi-select ----
function toggleSelect(paneId) {
  if (selectedPanes.has(paneId)) selectedPanes.delete(paneId);
  else selectedPanes.add(paneId);
  const el = paneEls[paneId];
  if (el) el.classList.toggle('selected', selectedPanes.has(paneId));
  updateSelBar();
}
function clearSelection() {
  selectedPanes.clear();
  document.querySelectorAll('.pcard.selected').forEach(c => c.classList.remove('selected'));
  updateSelBar();
}
function updateSelBar() {
  const n = selectedPanes.size;
  $('#selbar').style.display = n ? '' : 'none';
  $('#selcount').textContent = n + ' selected';
}
$('#sel-clear').onclick = () => clearSelection();
$('#sel-close').onclick = () => closePanes([...selectedPanes]);

// ---- right-click context menu ----
function openCtxMenu(e, p) {
  const menu = $('#ctxmenu');
  menu.innerHTML = '';
  const multi = selectedPanes.size > 1 && selectedPanes.has(p.pane_id);
  if (multi) {
    addMI(menu, 'Close ' + selectedPanes.size + ' panes', () => closePanes([...selectedPanes]), true);
  } else {
    addMI(menu, 'Rename…', () => renameTab(p));
    addMI(menu, 'Close pane', () => closePanes([p.pane_id]), true);
  }
  menu.style.left = '0px'; menu.style.top = '0px'; menu.classList.add('open');  // measure then clamp
  const r = menu.getBoundingClientRect();
  const x = Math.min(e.clientX, innerWidth - r.width - 4);
  const y = Math.min(e.clientY, innerHeight - r.height - 4);
  menu.style.left = x + 'px'; menu.style.top = y + 'px';
}
function addMI(menu, label, fn, danger) {
  const d = document.createElement('div');
  d.className = 'mi' + (danger ? ' danger' : '');
  d.textContent = label;
  d.onclick = (ev) => { ev.stopPropagation(); closeCtxMenu(); fn(); };
  menu.appendChild(d);
}
function closeCtxMenu() { $('#ctxmenu').classList.remove('open'); }
document.addEventListener('click', closeCtxMenu);
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeCtxMenu(); });
document.addEventListener('contextmenu', (e) => { if (!e.target.closest('.pcard')) closeCtxMenu(); });
$('#panegrid').addEventListener('scroll', closeCtxMenu);

// ---- rename / close ----
async function renameTab(p) {
  const cur = p.tab_label || '';
  const name = prompt('Rename tab', cur);
  if (name == null) return;
  const label = name.trim();
  if (!label || label === cur) return;
  try {
    const r = await fetch('/api/rename', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ tab_id: p.tab_id, label }),
    });
    if (!r.ok) throw new Error(await r.text());
    showPaneMsg('');
    loadPanes();
  } catch (e) { showPaneMsg('rename failed: ' + e.message, true); }
}

async function closePanes(paneIds) {
  paneIds = [...new Set(paneIds)].filter(Boolean);
  if (!paneIds.length) return;
  const n = paneIds.length;
  const names = paneIds.map(id => (paneData[id] && paneData[id].tab_label) || id).slice(0, 5).join(', ');
  if (!confirm('Close ' + n + ' pane' + (n === 1 ? '' : 's') + '?\n' + names +
               (n > 5 ? ', …' : '') + '\n\nThis terminates the terminal' + (n === 1 ? '' : 's') +
               ' (and any agent running in ' + (n === 1 ? 'it' : 'them') + ').')) return;
  try {
    const r = await fetch('/api/close', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pane_ids: paneIds }),
    });
    if (!r.ok) throw new Error(await r.text());
    const res = await r.json();
    clearSelection();
    loadPanes();
    const nErr = res.errors ? Object.keys(res.errors).length : 0;
    if (nErr) showPaneMsg('closed ' + (res.closed ? res.closed.length : 0) + ', ' + nErr + ' failed', true);
    else showPaneMsg('');
  } catch (e) { showPaneMsg('close failed: ' + e.message, true); }
}

function showPaneMsg(msg, bad) {
  const el = $('#panes-msg');
  if (!msg) { el.style.display = 'none'; return; }
  el.style.display = '';
  el.textContent = msg;
  el.style.color = bad ? 'var(--bad)' : 'var(--muted)';
  el.style.borderColor = bad ? 'var(--bad)' : 'var(--border)';
}

$('#panes-refresh').onclick = () => loadPanes();

// ---- diff viewer ----
async function loadDiff() {
  const base = diffCwd || activeCwd;
  const list = $('#difflist');
  if (!base) { list.innerHTML = '<div class="empty">no active directory yet</div>'; return; }
  diffCwd = base;
  $('#diff-repo').textContent = tilde(base);
  const params = new URLSearchParams({ path: base });
  if ($('#diff-ws').checked) params.set('ignoreWhitespace', 'true');
  if ($('#diff-untracked').checked) params.set('includeUntracked', 'true');
  try {
    const r = await fetch('/api/diff?' + params);
    if (!r.ok) throw new Error(await r.text());
    renderDiff(await r.json());
  } catch (e) {
    list.innerHTML = '<div class="empty">cannot diff this directory<br>' + escapeHtml(e.message) + '</div>';
    $('#diff-branch').textContent = '—';
    $('#diff-base').style.display = 'none';
    showDiffMsg('');
  }
}

function renderDiff(data) {
  $('#diff-branch').textContent = data.branch || '—';
  $('#diff-repo').textContent = tilde(data.repo || diffCwd || '');
  const baseEl = $('#diff-base');
  if (data.isBranchDiff && data.baseBranch) { baseEl.style.display = ''; baseEl.textContent = 'vs ' + data.baseBranch; }
  else baseEl.style.display = 'none';
  showDiffMsg(data.truncated ? 'diff truncated (large)' : '', data.truncated);

  const files = parseDiff(data.diff || '');
  const list = $('#difflist');
  if (!files.length) {
    list.innerHTML = '<div class="empty">no changes' + (data.branch ? ' on ' + escapeHtml(data.branch) : '') + '</div>';
    return;
  }
  list.innerHTML = '';
  for (const f of files) list.appendChild(diffFileEl(f));
}

// minimal unified-diff parser: split into per-file blocks of typed lines
function parseDiff(text) {
  const files = [];
  let cur = null;
  for (const line of text.split('\n')) {
    if (line.startsWith('diff --git')) {
      cur = { path: '', lines: [], add: 0, del: 0 };
      files.push(cur);
      const m = line.match(/ b\/(.+)$/);
      if (m) cur.path = m[1];
      continue;
    }
    if (!cur) continue;
    if (line.startsWith('--- ')) continue;
    if (line.startsWith('+++ ')) { const m = line.match(/^\+\+\+ b\/(.+)$/); if (m) cur.path = m[1]; continue; }
    if (line.startsWith('@@')) { cur.lines.push({ t: 'hunk', s: line }); continue; }
    if (line.startsWith('+')) { cur.lines.push({ t: 'add', s: line.slice(1) }); cur.add++; continue; }
    if (line.startsWith('-')) { cur.lines.push({ t: 'del', s: line.slice(1) }); cur.del++; continue; }
    if (line.startsWith(' ')) { cur.lines.push({ t: 'ctx', s: line.slice(1) }); continue; }
    if (line.startsWith('Binary ')) { cur.lines.push({ t: 'meta', s: line }); continue; }
    // index/new file/mode/rename/"\ No newline" lines — not shown
  }
  return files;
}

function diffFileEl(f) {
  const wrap = document.createElement('div');
  wrap.className = 'dfile';
  const collapsed = diffCollapsed.has(f.path);
  const head = document.createElement('div');
  head.className = 'dfhead';
  head.innerHTML = '<span class="caret">' + (collapsed ? '▸' : '▾') + '</span>' +
    '<span class="dfname">' + escapeHtml(f.path || '(unknown)') + '</span>' +
    '<span class="dfstat"><span class="add">+' + f.add + '</span> <span class="del">−' + f.del + '</span></span>';
  const body = document.createElement('div');
  body.className = 'dfbody';
  if (collapsed) body.style.display = 'none';
  for (const ln of f.lines) {
    const d = document.createElement('div');
    d.className = 'dline ' + ln.t;
    const sign = ln.t === 'add' ? '+' : ln.t === 'del' ? '-' : '';
    d.innerHTML = '<span class="sign">' + sign + '</span><span class="txt">' + escapeHtml(ln.s) + '</span>';
    body.appendChild(d);
  }
  head.onclick = () => {
    const c = !diffCollapsed.has(f.path);
    if (c) diffCollapsed.add(f.path); else diffCollapsed.delete(f.path);
    body.style.display = c ? 'none' : '';
    head.querySelector('.caret').textContent = c ? '▸' : '▾';
  };
  wrap.appendChild(head);
  wrap.appendChild(body);
  return wrap;
}

function showDiffMsg(msg, bad) {
  const el = $('#diff-msg');
  if (!msg) { el.style.display = 'none'; return; }
  el.style.display = '';
  el.textContent = msg;
  el.style.color = bad ? 'var(--warn)' : 'var(--muted)';
  el.style.borderColor = bad ? 'var(--warn)' : 'var(--border)';
}

$('#diff-refresh').onclick = () => loadDiff();
$('#diff-ws').onchange = () => loadDiff();
$('#diff-untracked').onchange = () => loadDiff();
$('#diff-wrap').onchange = () => $('#difflist').classList.toggle('wrap', $('#diff-wrap').checked);
$('#diff-collapse').onclick = () => {
  diffAllCollapsed = !diffAllCollapsed;
  $('#diff-collapse').textContent = diffAllCollapsed ? 'expand all' : 'collapse all';
  document.querySelectorAll('#difflist .dfile').forEach(fe => {
    const name = fe.querySelector('.dfname').textContent;
    if (diffAllCollapsed) diffCollapsed.add(name); else diffCollapsed.delete(name);
    fe.querySelector('.dfbody').style.display = diffAllCollapsed ? 'none' : '';
    fe.querySelector('.caret').textContent = diffAllCollapsed ? '▸' : '▾';
  });
};

// ---- browser pane ----
function initBrowser() {
  if (browserInit) return;
  browserInit = true;
  let url = '';
  try { url = localStorage.getItem('browserUrl') || ''; } catch (e) {}
  // default to the host this UI was reached on (the tailscale IP / MagicDNS
  // name the user typed), port 3000 — the usual dev-server port
  if (!url) url = location.protocol + '//' + location.hostname + ':3000';
  $('#br-url').value = url;
  navBrowser(url);
}
function navBrowser(raw) {
  let u = (raw || '').trim();
  if (!u) return;
  if (!/^https?:\/\//i.test(u)) u = 'http://' + u;
  $('#br-url').value = u;
  $('#brframe').src = u;
  try { localStorage.setItem('browserUrl', u); } catch (e) {}
}
$('#br-go').onclick = () => navBrowser($('#br-url').value);
$('#br-url').addEventListener('keydown', e => { if (e.key === 'Enter') navBrowser(e.target.value); });
$('#br-reload').onclick = () => { const f = $('#brframe'); f.src = f.src; };
$('#br-open').onclick = () => { const u = $('#br-url').value.trim(); if (u) window.open(/^https?:\/\//i.test(u) ? u : 'http://' + u, '_blank'); };

// ---- active pane (SSE) ----
function applyActive(a) {
  $('#live').classList.add('live');
  $('#ws').textContent = 'ws: ' + (a.workspace_label || a.workspace_id || '—');
  $('#tab').textContent = 'tab: ' + (a.tab_label || a.tab_id || '—');
  const ag = $('#agent');
  if (a.agent || (a.agent_status && a.agent_status !== 'unknown')) {
    ag.style.display = '';
    ag.className = 'pill agent ' + (a.agent_status || '');
    ag.textContent = (a.agent || 'agent') + (a.agent_status ? ' · ' + a.agent_status : '');
  } else ag.style.display = 'none';

  // provenance of the cwd: process = real (resolved from the agent process),
  // stale = agent pane we couldn't resolve (herdr's shell launch dir), shell = trustworthy
  const src = $('#src');
  src.className = 'pill src ' + (a.cwd_source || '');
  if (a.cwd_source === 'process') { src.textContent = 'cwd ✓ process'; src.title = "real cwd, resolved from the agent process"; }
  else if (a.cwd_source === 'stale') { src.textContent = '⚠ shell cwd'; src.title = "agent pane — herdr only knows the shell's launch dir; couldn't pin the agent's real cwd. Use the path box."; }
  else { src.textContent = ''; }

  if (a.cwd && a.cwd !== activeCwd) {
    activeCwd = a.cwd;
    if ($('#follow').checked) loadDir(a.cwd);
    if ($('#diff-follow').checked) { diffCwd = a.cwd; if (curView === 'diff') loadDiff(); }
  }

  // keep the pane grid's focus highlight in sync with herdr
  if (a.pane_id && a.pane_id !== activePaneID) {
    activePaneID = a.pane_id;
    if (Object.keys(paneEls).length) {
      Object.values(paneEls).forEach(c => c.classList.remove('focused'));
      if (paneEls[a.pane_id]) paneEls[a.pane_id].classList.add('focused');
    }
  }

  // pane-grid layout changed (workspaces reordered/renamed, panes added/removed):
  // reload the grid so its order matches herdr. Only when the Panes tab is open —
  // otherwise it refetches fresh on open anyway. Skip the first event (priming).
  if (typeof a.panes_rev === 'number' && a.panes_rev !== lastPanesRev) {
    const first = lastPanesRev === -1;
    lastPanesRev = a.panes_rev;
    if (!first && curView === 'panes') loadPanes();
  }
}

function connectSSE() {
  const es = new EventSource('/api/events');
  es.addEventListener('active', e => applyActive(JSON.parse(e.data)));
  es.onerror = () => { $('#live').classList.remove('live'); };
}

$('#follow').onchange = () => { if ($('#follow').checked && activeCwd) loadDir(activeCwd); };
$('#diff-follow').onchange = () => { if ($('#diff-follow').checked && activeCwd) { diffCwd = activeCwd; if (curView === 'diff') loadDiff(); } };

// manual path entry + jump-to-active — always available, so a wrong/stale guess is never a dead end
$('#path').addEventListener('keydown', e => {
  const v = e.target.value.trim();
  if (e.key === 'Enter' && v) loadDir(v);
});
$('#jump').onclick = () => { if (activeCwd) loadDir(activeCwd); };

// ---- splitter ----
(function () {
  const sp = $('#splitter'), app = $('#app'), left = $('#left');
  let drag = false;
  sp.onmousedown = e => { drag = true; sp.classList.add('dragging'); app.classList.add('dragging'); e.preventDefault(); };
  window.onmousemove = e => {
    if (!drag) return;
    const pct = Math.min(85, Math.max(15, (e.clientX / app.clientWidth) * 100));
    left.style.flex = '0 0 ' + pct + '%';
  };
  window.onmouseup = () => { drag = false; sp.classList.remove('dragging'); app.classList.remove('dragging'); };
})();

// ---- collapsible sidebar ----
(function () {
  const app = $('#app'), left = $('#left');
  let savedFlex = '';
  function setCollapsed(on) {
    if (on) {
      savedFlex = left.style.flex;   // remember any dragged split width
      left.style.flex = '';          // let CSS grow the terminal to fill
      app.classList.add('collapsed');
    } else {
      app.classList.remove('collapsed');
      if (savedFlex) left.style.flex = savedFlex;
    }
    try { localStorage.setItem('sidebarCollapsed', on ? '1' : '0'); } catch (e) {}
  }
  $('#collapse').onclick = () => setCollapsed(true);
  $('#reopen').onclick = () => setCollapsed(false);
  try { if (localStorage.getItem('sidebarCollapsed') === '1') setCollapsed(true); } catch (e) {}
})();

// ---- helpers ----
function escapeHtml(s){return s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function tilde(p){ return (p||'').replace(/^\/home\/[^/]+/, '~'); }
function fmtSize(n){ if(n==null)return''; const u=['B','K','M','G']; let i=0; while(n>=1024&&i<u.length-1){n/=1024;i++;} return (i?n.toFixed(1):n)+u[i]; }

// boot
(async function () {
  try {
    const a = await (await fetch('/api/active')).json();
    applyActive(a);
    if (a.cwd) { activeCwd = a.cwd; loadDir(a.cwd); }
  } catch (e) { /* SSE will populate */ }
  connectSSE();
})();
</script>
</body>
